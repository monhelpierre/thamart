<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B2D8F"/>
      <stop offset="100%" stop-color="#1CA8DD"/>
    </linearGradient>
    <linearGradient id="gem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f0d8ee" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Bead necklace arc -->
  <path d="M 18 38 Q 50 18 82 38" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Beads along the arc -->
  <circle cx="18" cy="38" r="5.5" fill="white" opacity="0.85"/>
  <circle cx="33" cy="26" r="5"   fill="white" opacity="0.85"/>
  <circle cx="50" cy="21" r="6"   fill="white" opacity="0.95"/>
  <circle cx="67" cy="26" r="5"   fill="white" opacity="0.85"/>
  <circle cx="82" cy="38" r="5.5" fill="white" opacity="0.85"/>

  <!-- Gem pendant hanging from center bead -->
  <line x1="50" y1="27" x2="50" y2="38" stroke="white" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Diamond / gem shape -->
  <polygon points="50,38 43,50 50,64 57,50" fill="url(#gem)"/>
  <polygon points="50,38 43,50 50,46" fill="white" opacity="0.4"/>

  <!-- Letter T centered below gem -->
  <text
    x="50" y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="bold"
    letter-spacing="2"
    text-anchor="middle"
    fill="white"
    opacity="0.92"
  >THAMART</text>
</svg>
